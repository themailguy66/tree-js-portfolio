events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json model/gltf-binary;

    server {
        listen 80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Serve static files (SPA fallback)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets (incl. 3D models and textures)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|glb|gltf|hdr|ktx2|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
