name: Build and Push Container

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Production version to release (e.g. 1.0.23)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
          type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Ansible and community.docker collection
      run: |
        pip install ansible
        ansible-galaxy collection install community.docker

    - name: Set up deploy SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key

    - name: Deploy staging
      working-directory: ansible
      env:
        ANSIBLE_VAULT_PASS: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
      run: |
        printf '#!/bin/sh\nprintf "%%s" "${ANSIBLE_VAULT_PASS}"\n' > /tmp/vault_pass.sh
        chmod +x /tmp/vault_pass.sh
        ansible-playbook \
          -i inventory.yml \
          deploy-staging.yml \
          --vault-password-file /tmp/vault_pass.sh \
          -e "app_version=main" \
          -e "ansible_ssh_private_key_file=~/.ssh/deploy_key"

  deploy:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Ansible and community.docker collection
      run: |
        pip install ansible
        ansible-galaxy collection install community.docker

    - name: Set up deploy SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key

    - name: Extract version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        fi

    - name: Deploy to production
      working-directory: ansible
      env:
        ANSIBLE_VAULT_PASS: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
      run: |
        printf '#!/bin/sh\nprintf "%%s" "${ANSIBLE_VAULT_PASS}"\n' > /tmp/vault_pass.sh
        chmod +x /tmp/vault_pass.sh
        ansible-vault view --vault-password-file /tmp/vault_pass.sh group_vars/all/vault.yml > /dev/null
        echo "Vault decryption: OK"
        ansible-playbook \
          -i inventory.yml \
          deploy.yml \
          --vault-password-file /tmp/vault_pass.sh \
          -e "app_version=${{ steps.version.outputs.tag }}" \
          -e "ansible_ssh_private_key_file=~/.ssh/deploy_key"

    - name: Create and push release tag
      if: github.event_name == 'workflow_dispatch'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag v${{ inputs.version }}
        git push origin v${{ inputs.version }}
